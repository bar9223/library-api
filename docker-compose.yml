services:
    app:
        build: .
        ports:
            - "8080:80"
        environment:
            APP_ENV: prod
            APP_DEBUG: 0
            APP_SECRET: 1f2d3c4b5a69788796a5b4c3d2e1f0a9
            DATABASE_URL: "postgresql://library:library@db:5432/library?serverVersion=16&charset=utf8"
            DB_HOST: db
            DB_USER: library
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: library
            POSTGRES_PASSWORD: library
            POSTGRES_DB: library
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U library -d library"]
            interval: 5s
            timeout: 5s
            retries: 10
        volumes:
            - db_data:/var/lib/postgresql/data

volumes:
    db_data:
